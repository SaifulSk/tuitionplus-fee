<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fees Receipt Generator</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f4f6f9;
  margin: 0;
  padding: 15px;
}

@media print {
  body {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .form, .btn {
    display: none;
  }
}

.form {
  max-width: 800px;
  margin: auto;
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
}

.form input, .form select {
  padding: 12px;
  margin: 8px 0;
  width: 100%;
  box-sizing: border-box;
  border-radius: 10px;
  border: 1px solid #ccc;
  -webkit-appearance: none;
  appearance: none;
  font-size: 16px;
}

/* MULTI SELECT HEIGHT */
#months {
  height: 120px;
}

.button-group {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.btn {
  padding: 10px 15px;
  background: #C1121F;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 5px;
  margin-top: 10px;
}

.receipt {
  max-width: 700px;
  margin: auto;
  background: white;
  border-radius: 15px;
  padding: 20px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

.logo {
  width: 150px;
  display: block;
  margin: auto;
}

.title {
  text-align: center;
  font-size: 28px;
  color: #1E3A5F;
  font-weight: bold;
}

.subtitle {
  text-align: center;
  color: #555;
  margin-bottom: 20px;
}

.table {
  width: 100%;
  border-collapse: collapse;
}

.table td {
  padding: 10px;
  border: 1px solid #ddd;
  font-size: 14px;
}

.label {
  background: #f1f1f1;
  font-weight: bold;
  width: 40%;
}

.address-box {
  margin-top: 15px;
  padding: 12px;
  background: #f1f4f8;
  border-radius: 10px;
  text-align: center;
  font-size: 14px;
}

.footer {
  margin-top: 20px;
  background: #1E3A5F;
  color: white;
  padding: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
}

.footer img {
  width: 35px;
}

.phone {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 14px;
}

@media(max-width:600px){
  .phone {
    margin-top: 15px;
  }
}
</style>
</head>

<body>

<div class="form">
  <h3>Enter Details</h3>

  <input type="text" id="name" placeholder="Student Name">

  <select id="class">
    <option value="">Select Class</option>
    <option>5</option>
    <option>6</option>
    <option>7</option>
    <option>8</option>
    <option>9</option>
    <option>10</option>
    <option>11</option>
    <option>12</option>
  </select>

  <input type="date" id="date">

  <!-- ✅ MULTI MONTH SELECT -->
  <select id="months" multiple>
    <option value="2026-01">January 2026</option>
    <option value="2026-02">February 2026</option>
    <option value="2026-03">March 2026</option>
    <option value="2026-04">April 2026</option>
    <option value="2026-05">May 2026</option>
    <option value="2026-06">June 2026</option>
    <option value="2026-07">July 2026</option>
    <option value="2026-08">August 2026</option>
    <option value="2026-09">September 2026</option>
    <option value="2026-10">October 2026</option>
    <option value="2026-11">November 2026</option>
    <option value="2026-12">December 2026</option>
  </select>

  <select id="mode">
    <option value="">Payment Mode</option>
    <option>Cash</option>
    <option>PhonePe</option>
    <option>Google Pay</option>
    <option>Paytm</option>
    <option>Online</option>
  </select>

  <div class="button-group">
    <button class="btn" onclick="generate()">Generate</button>
    <button class="btn" id="printBtn" onclick="window.print()" style="display:none;">
      Print / Save PDF
    </button>
  </div>
</div>

<div class="receipt">

  <img src="logo.png" class="logo">

  <div class="title">FEES PAID</div>
  <div class="subtitle">Fees Payment Received</div>

  <table class="table">
    <tr>
      <td class="label">Student Name</td>
      <td id="r_name">---</td>
    </tr>
    <tr>
      <td class="label">Class</td>
      <td id="r_class">---</td>
    </tr>
    <tr>
      <td class="label">Date Paid On</td>
      <td id="r_date">---</td>
    </tr>
    <tr>
      <td class="label">Months Paid For</td>
      <td id="r_months">---</td>
    </tr>
    <tr>
      <td class="label">Mode Of Payment</td>
      <td id="r_mode">---</td>
    </tr>
  </table>

  <div class="address-box">
    Pirtala Bulu Market below Pirtala Nursing Home | Few metres away from KECS
  </div>

  <div class="footer">
    <div style="display:flex; align-items:center; gap:8px;">
      <img src="logo.png">
      <div>
        <strong>TUITION PLUS</strong><br>
        <small>Empowering Young Minds</small>
      </div>
    </div>

    <div class="phone">
      📞 8013753344
    </div>
  </div>

</div>

<script>
// Disable future date
const today = new Date().toISOString().split("T")[0];
document.getElementById("date").setAttribute("max", today);

// Format date
function formatDate(dateStr) {
  const date = new Date(dateStr);
  return date.toLocaleDateString('en-GB', {
    day: 'numeric',
    month: 'long',
    year: 'numeric'
  });
}

// Format months
function getSelectedMonths() {
  const selected = Array.from(document.getElementById("months").selectedOptions);
  return selected.map(opt => opt.text).join(", ");
}

function generate() {
  document.getElementById("r_name").innerText = document.getElementById("name").value;
  document.getElementById("r_class").innerText = document.getElementById("class").value;

  const dateVal = document.getElementById("date").value;
  document.getElementById("r_date").innerText = dateVal ? formatDate(dateVal) : "---";

  document.getElementById("r_months").innerText = getSelectedMonths();

  document.getElementById("r_mode").innerText = document.getElementById("mode").value;

  document.getElementById("printBtn").style.display = "inline-block";
}
</script>

</body>
</html>
